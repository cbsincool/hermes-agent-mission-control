version: '3.8'

services:
  # Next.js 可视化面板
  mission-control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-mission-control
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:hermes2024@postgres:5432/hermes
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hermes-network

  # Postgres 数据库
  postgres:
    image: postgres:16-alpine
    container_name: hermes-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=hermes2024
      - POSTGRES_DB=hermes
    ports:
      - "5432:5432"  # 开放外部访问
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hermes-network

volumes:
  postgres_data:
    driver: local

networks:
  hermes-network:
    driver: bridge
